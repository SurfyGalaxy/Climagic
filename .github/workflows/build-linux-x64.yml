name: Build Linux X86_64

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-file: '3.14' # Matches your dev machine

    - name: Install System Dependencies for Qt6
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1-mesa-dev libgl1-mesa-dev libxcb-cursor0

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt6 PyQt6-WebEngine pyyaml nltk

    - name: Compile Application with PyInstaller
      run: |
        pyinstaller main.spec

    - name: Upload Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Climagic-Linux
        path: dist/main  # Matches the 'name' given in your main.spec exe block